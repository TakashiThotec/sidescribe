<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidescribe - Settings</title>
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>⚙️ Sidescribe Settings</h1>
    </header>

    <form id="settings-form">
      <!-- Notion API -->
      <fieldset>
        <legend>Notion API</legend>
        <div class="field">
          <label for="notion-api-key">API Key (Internal Integration Token)</label>
          <input type="password" id="notion-api-key" placeholder="ntn_...">
          <p class="hint">
            <a href="https://www.notion.so/my-integrations" target="_blank">Notion Integrations</a>
            で作成したInternal Integration Tokenを入力
          </p>
        </div>
      </fieldset>

      <!-- Database IDs -->
      <fieldset>
        <legend>Database IDs</legend>

        <!-- Memo DB -->
        <div class="db-section" id="memo-section">
          <div class="field">
            <label for="memo-db-id">📌 Memo Database ID</label>
            <input type="text" id="memo-db-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
            <p class="hint">メモの保存先データベース</p>
          </div>
          <button type="button" class="btn-fetch-schema" id="memo-fetch-schema">🔄 スキーマ取得</button>
          <div class="mapping-panel" id="memo-mapping" style="display: none;">
            <div class="mapping-field">
              <label>タイトル (title)</label>
              <select id="memo-map-title"></select>
            </div>
            <div class="mapping-field">
              <label>URL (url)</label>
              <select id="memo-map-url"></select>
            </div>
            <div class="mapping-field">
              <label>メモ (rich_text)</label>
              <select id="memo-map-note"></select>
            </div>
            <div class="mapping-field">
              <label>作成日時 (date)</label>
              <select id="memo-map-created"></select>
            </div>
          </div>
        </div>

        <!-- Bank DB -->
        <div class="db-section" id="bank-section">
          <div class="field">
            <label for="bank-db-id">💰 Bank Transaction Database ID</label>
            <input type="text" id="bank-db-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
            <p class="hint">住信SBI 入出金履歴の保存先</p>
          </div>
          <button type="button" class="btn-fetch-schema" id="bank-fetch-schema">🔄 スキーマ取得</button>
          <div class="mapping-panel" id="bank-mapping" style="display: none;">
            <div class="mapping-field">
              <label>record: 取引内容 (title)</label>
              <select id="bank-map-record"></select>
            </div>
            <div class="mapping-field">
              <label>date: 日付 (date)</label>
              <select id="bank-map-date"></select>
            </div>
            <div class="mapping-field">
              <label>value: 金額 (number)</label>
              <select id="bank-map-value"></select>
            </div>
            <div class="mapping-field">
              <label>flow: in/out (select)</label>
              <select id="bank-map-flow"></select>
            </div>
          </div>
        </div>

        <!-- Card DB -->
        <div class="db-section" id="card-section">
          <div class="field">
            <label for="card-db-id">💳 Card Statement Database ID</label>
            <input type="text" id="card-db-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
            <p class="hint">カード明細の保存先</p>
          </div>
          <button type="button" class="btn-fetch-schema" id="card-fetch-schema">🔄 スキーマ取得</button>
          <div class="mapping-panel" id="card-mapping" style="display: none;">
            <div class="mapping-field">
              <label>摘要 (title)</label>
              <select id="card-map-description"></select>
            </div>
            <div class="mapping-field">
              <label>日付 (date)</label>
              <select id="card-map-date"></select>
            </div>
            <div class="mapping-field">
              <label>金額 (number)</label>
              <select id="card-map-amount"></select>
            </div>
            <div class="mapping-field">
              <label>カード名 (rich_text)</label>
              <select id="card-map-cardname"></select>
            </div>
            <div class="mapping-field">
              <label>カテゴリ (rich_text)</label>
              <select id="card-map-category"></select>
            </div>
          </div>
        </div>

        <!-- Calendar DB -->
        <div class="db-section" id="calendar-section">
          <div class="field">
            <label for="calendar-db-id">📅 Calendar Database ID</label>
            <input type="text" id="calendar-db-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
            <p class="hint">スケジュール表示用のNotion DB（Googleカレンダー連携DB等）</p>
          </div>
          <button type="button" class="btn-fetch-schema" id="calendar-fetch-schema">🔄 スキーマ取得</button>
          <div class="mapping-panel" id="calendar-mapping" style="display: none;">
            <div class="mapping-field">
              <label>タイトル (title)</label>
              <select id="calendar-map-title"></select>
            </div>
            <div class="mapping-field">
              <label>日付 (date)</label>
              <select id="calendar-map-date"></select>
            </div>
          </div>
        </div>

      </fieldset>

      <div class="actions">
        <button type="submit" class="btn btn-primary">💾 保存</button>
        <span id="save-status" class="save-status"></span>
      </div>
    </form>
  </div>
</body>
</html>
