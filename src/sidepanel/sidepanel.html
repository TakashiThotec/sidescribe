<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidescribe</title>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <h1 class="logo">📝 Sidescribe</h1>
      <button id="btn-settings" class="btn-icon" title="Settings">⚙️</button>
    </header>

    <!-- Status Bar -->
    <div id="status-bar" class="status-bar">
      <span id="page-hostname" class="hostname">—</span>
    </div>

    <!-- Not Configured Warning -->
    <div id="not-configured" class="alert alert-warning" style="display:none;">
      Notion APIキーが未設定です。
      <a href="#" id="link-settings">設定画面を開く</a>
    </div>

    <!-- Memo Section -->
    <section class="section">
      <h2 class="section-title">Quick Memo</h2>
      <div class="memo-form">
        <div class="field">
          <label for="memo-title">Page Title</label>
          <input type="text" id="memo-title" readonly>
        </div>
        <div class="field">
          <label for="memo-url">URL</label>
          <input type="text" id="memo-url" readonly>
        </div>
        <div class="field">
          <label for="memo-note">Note</label>
          <textarea id="memo-note" rows="3" placeholder="メモを入力..."></textarea>
        </div>
        <button id="btn-save-memo" class="btn btn-primary">📌 メモを保存</button>
      </div>
    </section>

    <!-- Site-Specific Actions -->
    <section id="site-actions" class="section" style="display:none;">
      <h2 class="section-title">Site Actions</h2>
      <div id="site-actions-content"></div>
    </section>

    <!-- Toast -->
    <div id="toast" class="toast" style="display:none;"></div>
  </div>
</body>
</html>
